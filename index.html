<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boda C & D - Cronograma</title>
    <meta property="og:title" content="💍 Cronograma Boda C & D">
    <meta property="og:description" content="Nuestra lista de tareas y fechas importantes actualizadas en tiempo real.">
    <meta property="og:image" content="https://images.unsplash.com/photo-1511285560929-80b456fea0bc?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        wedding: { light: '#fdfbf7', accent: '#d4af37', dark: '#2c3e50', sage: '#8a9a86' }
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap');
        body { font-family: 'Lato', sans-serif; background-color: #f5f3f0; }
        h1, h2, h3, .font-serif { font-family: 'Playfair Display', serif; }
        
        .task-item { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .completed-card { opacity: 0.6; background-color: #fdfdfd; }
        .completed-text { text-decoration: line-through; color: #9ca3af; }
        .modal-overlay { background-color: rgba(44, 62, 80, 0.7); backdrop-filter: blur(4px); }
        .toast-enter { transform: translateY(0); opacity: 1; }
        .toast-exit { transform: translateY(100%); opacity: 0; }
        
        /* Estilos específicos para Arrastrar y Soltar */
        .dragging { opacity: 0.4; border: 2px dashed #8a9a86 !important; transform: scale(0.98); }
        .drag-over { border-top: 3px solid #8a9a86 !important; padding-top: 15px !important; }
        /* Prevenir que los elementos internos interfieran con el drag and drop */
        .pointer-events-none-children * { pointer-events: none; }
    </style>
</head>
<body class="min-h-screen pb-10 flex flex-col items-center">

    <div class="w-full max-w-lg mx-auto bg-wedding-light min-h-screen shadow-xl sm:min-h-0 sm:mt-10 sm:rounded-3xl overflow-hidden relative flex flex-col border border-gray-100">
        
        <!-- CABECERA -->
        <div class="bg-wedding-dark text-white p-8 relative overflow-hidden">
            <div class="absolute inset-0 opacity-10" style="background-image: radial-gradient(circle at 2px 2px, white 1px, transparent 0); background-size: 20px 20px;"></div>
            
            <div class="relative z-10 text-center">
                <div class="inline-flex items-center justify-center w-14 h-14 rounded-full bg-white/10 border border-wedding-accent/30 text-wedding-accent text-2xl mb-4 shadow-inner">
                    <i class="fa-solid fa-rings-wedding"></i>
                </div>
                <h1 class="text-3xl font-bold tracking-wide mb-1 text-white">Boda C & D</h1>
                <p class="text-wedding-accent text-sm uppercase tracking-[0.2em] font-medium">Cronograma</p>
            </div>
            
            <!-- Botón de Configuración GitHub -->
            <button onclick="openConfigModal()" class="absolute top-4 right-4 w-8 h-8 flex items-center justify-center rounded-full bg-white/10 text-white/50 hover:text-white hover:bg-white/20 transition-colors">
                <i class="fa-solid fa-gear text-sm"></i>
            </button>
            
            <!-- Indicador de Sincronización -->
            <div id="syncStatus" class="absolute top-4 left-4 flex items-center gap-2 text-xs text-white/70 bg-white/10 px-2 py-1 rounded-full">
                <i class="fa-solid fa-cloud"></i> <span id="syncText">Leyendo...</span>
            </div>
        </div>

        <!-- ÁREA ADMIN: FORMULARIO -->
        <div id="adminPanel" class="p-5 bg-white border-b border-gray-100 z-10 sticky top-0 shadow-sm hidden">
            <form id="taskForm" class="flex gap-2">
                <input type="text" id="taskInput" placeholder="Añadir nuevo evento (ej. Viernes 20: Prueba menú)..." 
                    class="w-full px-4 py-3.5 rounded-xl border border-gray-200 focus:outline-none focus:border-wedding-sage focus:ring-1 focus:ring-wedding-sage shadow-inner text-sm bg-gray-50"
                    autocomplete="off" required>
                <button type="submit" class="bg-wedding-sage hover:bg-opacity-90 text-white px-5 rounded-xl shadow-md transition-colors" id="addBtn">
                    <i class="fa-solid fa-plus text-lg"></i>
                </button>
            </form>
        </div>

        <!-- LISTA DE TAREAS -->
        <div id="listContainer" class="p-4 flex-1 overflow-y-auto bg-wedding-light relative">
            
            <!-- Cargando Inicial -->
            <div id="loadingState" class="flex flex-col items-center justify-center py-16 text-wedding-sage">
                <i class="fa-solid fa-spinner fa-spin text-4xl mb-3"></i>
                <p class="text-sm font-medium text-gray-500">Conectando con GitHub...</p>
            </div>

            <ul id="taskList" class="space-y-3 pb-10 hidden"></ul>
            
            <!-- Estado vacío -->
            <div id="emptyState" class="hidden flex-col items-center justify-center py-16 text-gray-400">
                <i class="fa-solid fa-champagne-glasses text-5xl mb-4 text-gray-300"></i>
                <h3 class="font-serif text-xl font-bold text-wedding-dark mb-1">El cronograma está vacío</h3>
            </div>
        </div>
    </div>

    <!-- MODAL DE CONFIGURACIÓN GITHUB -->
    <div id="configModal" class="hidden fixed inset-0 modal-overlay z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-md p-6 shadow-2xl">
            <h3 class="font-serif text-xl font-bold text-wedding-dark mb-2"><i class="fa-brands fa-github mr-2"></i> Conexión a GitHub</h3>
            <p class="text-xs text-gray-500 mb-4 leading-relaxed">Para poder editar y guardar la lista desde el celular, necesitas configurar los datos de tu repositorio.</p>
            
            <div class="space-y-3 mb-5">
                <div>
                    <label class="block text-xs font-bold text-gray-700 mb-1">Usuario de GitHub</label>
                    <input type="text" id="ghUser" placeholder="ej. juanperez" class="w-full px-3 py-2 rounded-lg border bg-gray-50 text-sm">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 mb-1">Nombre del Repositorio</label>
                    <input type="text" id="ghRepo" placeholder="ej. cronograma-boda" class="w-full px-3 py-2 rounded-lg border bg-gray-50 text-sm">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 mb-1">Token de Acceso Personal (PAT)</label>
                    <input type="password" id="ghToken" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" class="w-full px-3 py-2 rounded-lg border bg-gray-50 text-sm font-mono">
                </div>
            </div>
            
            <div class="flex justify-end gap-3">
                <button onclick="closeConfigModal()" class="px-4 py-2 text-gray-500 hover:bg-gray-100 rounded-lg text-sm font-medium">Cancelar</button>
                <button onclick="saveGithubConfig()" class="px-4 py-2 bg-wedding-dark text-white rounded-lg text-sm font-medium shadow-md">Conectar y Guardar</button>
            </div>
        </div>
    </div>

    <!-- MODAL DE EDICIÓN -->
    <div id="editModal" class="hidden fixed inset-0 modal-overlay z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-sm p-6 shadow-xl">
            <h3 class="font-serif text-lg font-bold text-wedding-dark mb-4">Editar Evento</h3>
            <textarea id="editInput" class="w-full px-3 py-2 rounded-xl border bg-gray-50 min-h-[80px] text-sm resize-none mb-4"></textarea>
            <div class="flex justify-end gap-2">
                <button onclick="closeEditModal()" class="px-4 py-2 text-gray-500 hover:bg-gray-100 rounded-lg text-sm">Cancelar</button>
                <button id="saveEditBtn" class="px-4 py-2 bg-wedding-dark text-white rounded-lg text-sm shadow-md">Guardar</button>
            </div>
        </div>
    </div>

    <!-- TOAST (Notificaciones) -->
    <div id="toastMessage" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-wedding-dark text-white px-6 py-3 rounded-full shadow-xl flex items-center gap-3 transition-all duration-300 toast-exit z-50 w-max max-w-[90%] text-sm">
        <i class="fa-solid fa-circle-info" id="toastIcon"></i>
        <span id="toastText">Mensaje</span>
    </div>

    <script>
        const CSV_FILE_PATH = 'datos_boda.csv';
        let tasks = [];
        let githubConfig = JSON.parse(localStorage.getItem('boda_github_config')) || { user: '', repo: '', token: '' };
        let fileSha = null; 
        let isAdmin = false;
        
        // Variables para Arrastrar y Soltar
        let dragStartIndex = null;

        // Elementos DOM
        const loadingState = document.getElementById('loadingState');
        const taskListEl = document.getElementById('taskList');
        const emptyState = document.getElementById('emptyState');
        const adminPanel = document.getElementById('adminPanel');
        const taskForm = document.getElementById('taskForm');
        const taskInput = document.getElementById('taskInput');
        const addBtn = document.getElementById('addBtn');
        const configModal = document.getElementById('configModal');
        const syncStatus = document.getElementById('syncStatus');
        const editModal = document.getElementById('editModal');
        const editInput = document.getElementById('editInput');
        const saveEditBtn = document.getElementById('saveEditBtn');
        const toastMessage = document.getElementById('toastMessage');
        const toastText = document.getElementById('toastText');

        // --- 1. LÓGICA DE GITHUB API ---
        function checkAdminStatus() {
            isAdmin = (githubConfig.user && githubConfig.repo && githubConfig.token);
            if (isAdmin) {
                adminPanel.classList.remove('hidden');
                syncStatus.innerHTML = '<i class="fa-solid fa-link text-green-400"></i> <span class="text-white">Admin Conectado</span>';
            } else {
                adminPanel.classList.add('hidden');
                syncStatus.innerHTML = '<i class="fa-solid fa-eye text-blue-300"></i> <span class="text-white/80">Modo Lectura</span>';
            }
        }

        async function fetchFromGitHub() {
            try {
                if (!isAdmin) {
                    const response = await fetch(`${CSV_FILE_PATH}?v=${new Date().getTime()}`);
                    if (response.ok) {
                        const csvText = await response.text();
                        tasks = parseCSV(csvText);
                        finishLoading();
                    } else { throw new Error("No encontrado"); }
                    return;
                }

                const url = `https://api.github.com/repos/${githubConfig.user}/${githubConfig.repo}/contents/${CSV_FILE_PATH}`;
                const response = await fetch(url, {
                    headers: {
                        'Authorization': `token ${githubConfig.token}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'If-None-Match': '' 
                    }
                });

                if (response.status === 404) {
                    tasks = []; fileSha = null; finishLoading(); return;
                }

                if (!response.ok) throw new Error("Error API GitHub");

                const data = await response.json();
                fileSha = data.sha; 
                
                const csvText = decodeURIComponent(escape(atob(data.content)));
                tasks = parseCSV(csvText);
                finishLoading();

            } catch (error) {
                console.error("Error cargando datos:", error);
                showToast("Fallo al conectar. Mostrando versión local.", "error");
                finishLoading();
            }
        }

        async function saveToGitHub() {
            if (!isAdmin) return;
            
            syncStatus.innerHTML = '<i class="fa-solid fa-arrows-rotate fa-spin text-yellow-400"></i> <span class="text-white">Guardando...</span>';
            addBtn.disabled = true;

            const csvContent = generateCSV();
            const contentEncoded = btoa(unescape(encodeURIComponent(csvContent)));
            const url = `https://api.github.com/repos/${githubConfig.user}/${githubConfig.repo}/contents/${CSV_FILE_PATH}`;
            
            const bodyData = {
                message: "Actualización automática de Cronograma",
                content: contentEncoded
            };
            if (fileSha) bodyData.sha = fileSha; 

            try {
                const response = await fetch(url, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${githubConfig.token}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(bodyData)
                });

                if (!response.ok) throw new Error("Error API");

                const data = await response.json();
                fileSha = data.content.sha; 
                
                syncStatus.innerHTML = '<i class="fa-solid fa-check text-green-400"></i> <span class="text-white">Guardado</span>';
                setTimeout(() => checkAdminStatus(), 3000);
                
            } catch (error) {
                syncStatus.innerHTML = '<i class="fa-solid fa-triangle-exclamation text-red-400"></i> <span class="text-white">Error</span>';
                showToast("Error de sincronización. Revisa tu Token.", "error");
            } finally {
                addBtn.disabled = false;
            }
        }

        // --- 2. EL MOTOR CSV ---
        function parseCSV(csvText) {
            if (!csvText || csvText.trim() === '') return [];
            const lines = csvText.trim().split('\n');
            const newTasks = [];
            for (let i = 1; i < lines.length; i++) {
                let line = lines[i].trim();
                if (!line) continue;
                const lastCommaIndex = line.lastIndexOf('","');
                let text = '', statusStr = '';
                if (lastCommaIndex !== -1) {
                    text = line.substring(1, lastCommaIndex);
                    statusStr = line.substring(lastCommaIndex + 3, line.length - 1).toLowerCase();
                } else {
                    const simpleComma = line.lastIndexOf(',');
                    if (simpleComma !== -1) {
                        text = line.substring(0, simpleComma).replace(/^"|"$/g, '');
                        statusStr = line.substring(simpleComma + 1).replace(/^"|"$/g, '').toLowerCase();
                    } else { text = line; statusStr = 'pendiente'; }
                }
                newTasks.push({ id: Date.now() + i, text: text.replace(/""/g, '"'), completed: statusStr === 'completado' });
            }
            return newTasks;
        }

        function generateCSV() {
            let csvContent = '"Evento","Estado"\n';
            tasks.forEach(task => {
                let safeText = task.text.replace(/"/g, '""');
                csvContent += `"${safeText}","${task.completed ? 'completado' : 'pendiente'}"\n`;
            });
            return csvContent;
        }

        // --- 3. LÓGICA DE ARRASTRAR Y SOLTAR (DRAG & DROP) ---
        
        window.handleDragStart = function(e, index) {
            if (!isAdmin) return;
            dragStartIndex = index;
            e.dataTransfer.effectAllowed = 'move';
            // Retraso minúsculo para que la clase se aplique después de generar la imagen fantasma
            setTimeout(() => {
                e.target.classList.add('dragging');
            }, 0);
        };

        window.handleDragOver = function(e) {
            if (!isAdmin) return;
            e.preventDefault(); // Necesario para permitir el "drop"
            const li = e.target.closest('li');
            if (li && !li.classList.contains('dragging')) {
                li.classList.add('drag-over');
            }
        };

        window.handleDragLeave = function(e) {
            if (!isAdmin) return;
            const li = e.target.closest('li');
            if (li) {
                li.classList.remove('drag-over');
            }
        };

        window.handleDrop = function(e, targetIndex) {
            if (!isAdmin) return;
            e.preventDefault();
            const li = e.target.closest('li');
            if (li) li.classList.remove('drag-over');

            // Si se soltó en el mismo lugar o hubo un error, no hacer nada
            if (dragStartIndex === null || dragStartIndex === targetIndex) return;

            // Reordenar el arreglo
            const draggedTask = tasks.splice(dragStartIndex, 1)[0];
            tasks.splice(targetIndex, 0, draggedTask);

            dragStartIndex = null;
            renderTasks();
            saveToGitHub(); // Guardar el nuevo orden
            showToast("Orden actualizado", "success");
        };

        window.handleDragEnd = function(e) {
            if (!isAdmin) return;
            e.target.classList.remove('dragging');
            // Limpieza de seguridad por si algún elemento quedó con la clase activa
            document.querySelectorAll('.task-item').forEach(el => el.classList.remove('drag-over'));
            dragStartIndex = null;
        };


        // --- 4. RENDERIZADO VISUAL ---
        function finishLoading() {
            loadingState.classList.add('hidden');
            taskListEl.classList.remove('hidden');
            renderTasks();
        }

        function renderTasks() {
            taskListEl.innerHTML = '';
            if (tasks.length === 0) {
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
            } else {
                emptyState.classList.add('hidden');
                emptyState.classList.remove('flex');
            }

            tasks.forEach((task, index) => {
                const li = document.createElement('li');
                li.className = `task-item flex items-center justify-between p-4 rounded-2xl border ${task.completed ? 'completed-card border-gray-100' : 'bg-white border-gray-200 shadow-sm'}`;
                
                // Configurar eventos de arrastre si es Admin
                if (isAdmin) {
                    li.setAttribute('draggable', 'true');
                    li.setAttribute('ondragstart', `handleDragStart(event, ${index})`);
                    li.setAttribute('ondragover', `handleDragOver(event)`);
                    li.setAttribute('ondragleave', `handleDragLeave(event)`);
                    li.setAttribute('ondrop', `handleDrop(event, ${index})`);
                    li.setAttribute('ondragend', `handleDragEnd(event)`);
                }

                // Ícono de arrastre (solo admin)
                const dragHandle = isAdmin 
                    ? `<div class="cursor-grab text-gray-300 hover:text-gray-500 mr-3 flex items-center justify-center pointer-events-none-children" title="Arrastrar para ordenar">
                         <i class="fa-solid fa-grip-vertical"></i>
                       </div>` 
                    : '';

                // Botones de Admin
                const adminButtons = isAdmin ? `
                    <div class="flex gap-1 ml-3 shrink-0 flex-col sm:flex-row pointer-events-none-children">
                        <button onclick="openEdit(${task.id}, '${escapeHTML(task.text).replace(/'/g, "\\'")}')" class="w-8 h-8 rounded-full text-gray-400 hover:text-blue-500 hover:bg-blue-50 transition pointer-events-auto"><i class="fa-solid fa-pen text-xs"></i></button>
                        <button onclick="deleteTask(${task.id})" class="w-8 h-8 rounded-full text-gray-400 hover:text-red-500 hover:bg-red-50 transition pointer-events-auto"><i class="fa-solid fa-trash text-xs"></i></button>
                    </div>` : '';

                const checkClick = isAdmin ? `onclick="toggleTask(${task.id})"` : '';
                const cursorStyle = isAdmin ? 'cursor-pointer' : 'cursor-default';

                li.innerHTML = `
                    <div class="flex items-center flex-1 overflow-hidden">
                        ${dragHandle}
                        <div class="flex items-start gap-3 flex-1 ${cursorStyle} pointer-events-none-children" ${checkClick}>
                            <div class="w-6 h-6 mt-0.5 rounded-lg border-2 flex items-center justify-center transition-colors shrink-0 pointer-events-auto
                                ${task.completed ? 'bg-wedding-sage border-wedding-sage text-white' : 'border-gray-300 text-transparent hover:border-wedding-sage'}">
                                <i class="fa-solid fa-check text-xs"></i>
                            </div>
                            <span class="flex-1 text-wedding-dark text-[15px] font-medium leading-relaxed break-words ${task.completed ? 'completed-text' : ''}">${escapeHTML(task.text)}</span>
                        </div>
                    </div>
                    ${adminButtons}
                `;
                taskListEl.appendChild(li);
            });
        }

        // --- 5. LÓGICA CRUD ---
        taskForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const text = taskInput.value.trim();
            if (!text) return;
            tasks.push({ id: Date.now(), text: text, completed: false });
            taskInput.value = '';
            renderTasks();
            saveToGitHub();
        });

        window.toggleTask = (id) => {
            if (!isAdmin) return;
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                renderTasks();
                saveToGitHub();
            }
        };

        window.deleteTask = (id) => {
            if (confirm("¿Borrar este evento?")) {
                tasks = tasks.filter(t => t.id !== id);
                renderTasks();
                saveToGitHub();
            }
        };

        let currentEditingIdRef = null;
        window.openEdit = (id, currentText) => {
            currentEditingIdRef = id; 
            editInput.value = currentText; 
            editModal.classList.remove('hidden'); editModal.classList.add('flex');
            setTimeout(() => editInput.focus(), 50);
        };
        window.closeEditModal = () => { 
            editModal.classList.add('hidden'); editModal.classList.remove('flex');
            currentEditingIdRef = null; 
        };
        saveEditBtn.addEventListener('click', () => {
            if (!currentEditingIdRef) return;
            const newText = editInput.value.trim();
            if (!newText) { window.closeEditModal(); return; }
            const task = tasks.find(t => t.id === currentEditingIdRef);
            if (task) {
                task.text = newText;
                renderTasks();
                saveToGitHub();
            }
            window.closeEditModal(); 
        });

        // --- CONFIGURACIÓN MODAL ---
        function openConfigModal() {
            document.getElementById('ghUser').value = githubConfig.user;
            document.getElementById('ghRepo').value = githubConfig.repo;
            document.getElementById('ghToken').value = githubConfig.token;
            configModal.classList.remove('hidden');
        }
        function closeConfigModal() { configModal.classList.add('hidden'); }
        
        function saveGithubConfig() {
            githubConfig.user = document.getElementById('ghUser').value.trim();
            githubConfig.repo = document.getElementById('ghRepo').value.trim();
            githubConfig.token = document.getElementById('ghToken').value.trim();
            localStorage.setItem('boda_github_config', JSON.stringify(githubConfig));
            closeConfigModal();
            checkAdminStatus();
            loadingState.classList.remove('hidden');
            taskListEl.classList.add('hidden');
            fetchFromGitHub();
        }

        // --- UTILIDADES ---
        function escapeHTML(str) { return str.replace(/[&<>'"]/g, tag => ({'&': '&amp;','<': '&lt;','>': '&gt;',"'": '&#39;','"': '&quot;'}[tag] || tag)); }

        function showToast(message, type = 'info') {
            toastText.textContent = message;
            const icon = document.getElementById('toastIcon');
            if (type === 'error') { icon.className = 'fa-solid fa-triangle-exclamation text-red-400'; } 
            else if (type === 'success') { icon.className = 'fa-solid fa-circle-check text-wedding-accent'; }
            else { icon.className = 'fa-solid fa-circle-info text-blue-400'; }

            toastMessage.classList.remove('toast-exit'); toastMessage.classList.add('toast-enter');
            setTimeout(() => { toastMessage.classList.remove('toast-enter'); toastMessage.classList.add('toast-exit'); }, 3000);
        }

        // --- ARRANQUE ---
        checkAdminStatus();
        fetchFromGitHub();
        
    </script>
</body>
</html>
